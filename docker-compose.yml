services:
  web:
    build: .
    image: dailytok:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_PATH=/data/dailytok.db
    ports:
      - "${HOST_PORT:-3010}:3000"
    volumes:
      - dailytok-data:/data

  crawler:
    build: .
    image: dailytok:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_PATH=/data/dailytok.db
    volumes:
      - dailytok-data:/data
    # Seed immediately, then re-crawl every hour. Shares the DB volume with web.
    command: sh -c "while true; do npm run crawl; sleep 3600; done"

volumes:
  dailytok-data:
